<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All Care Central — Resources</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div class="app">
    <aside class="nav-rail" aria-label="Primary navigation">

        <a class="nav-item" href="index.html" aria-label="Home">

          <span class="nav-label">Home</span>
        </a>
        <a class="nav-item active" href="resources.html" aria-label="Resources">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l3 3v13H5z"/><path d="M16 3v3h3"/></svg>
          <span class="nav-label">Resources</span>
        </a>
        <a class="nav-item" href="forms.html" aria-label="Forms">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h10M7 12h10M7 17h6"/></svg>

      </nav>

        <div class="header-left logo-wrap">
          <img src="assets/branding/ACTLogo_Hires_FINAL.png" alt="All Care Therapies of Georgetown" class="full-logo" />
        </div>
        <div class="header-center search-panel">
          <input id="globalSearch" type="search" placeholder="Search Resources..." aria-label="Search Resources" />
        </div>
        <div class="header-right user-greeting">
          <div id="greetingText" class="greeting-name">Hello</div>
          <button id="headerSignOut" class="signout-link" type="button">Sign out</button>
        </div>
      </header>
      <div class="page-content">
        <section class="card">
          <h3>Clinic Resources</h3>
          <p class="muted">Curated resources for staff</p>

          <div id="resourcesLibrary" class="resources-list" data-source="resources">
            <!-- Resources loaded from /data/resources.json -->
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/main.js" defer></script>
  <script src="js/auth.js" defer></script>
